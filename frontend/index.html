<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 AI 创业模拟器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🎮 AI 创业模拟器</h1>
            <p class="subtitle">从车库创业到 AI 帝国</p>
        </header>

        <!-- 主状态面板 -->
        <div class="status-panel">
            <div class="status-card">
                <div class="status-icon">💰</div>
                <div class="status-info">
                    <div class="status-label">现金</div>
                    <div class="status-value" id="cash">$50,000</div>
                </div>
            </div>

            <div class="status-card">
                <div class="status-icon">⭐</div>
                <div class="status-info">
                    <div class="status-label">口碑</div>
                    <div class="status-value" id="reputation">3.0/5.0</div>
                </div>
            </div>

            <div class="status-card">
                <div class="status-icon">📅</div>
                <div class="status-info">
                    <div class="status-label">天数</div>
                    <div class="status-value" id="day">0</div>
                </div>
            </div>

            <div class="status-card">
                <div class="status-icon">👥</div>
                <div class="status-info">
                    <div class="status-label">员工</div>
                    <div class="status-value" id="agents">0</div>
                </div>
            </div>
        </div>

        <!-- 每日收支 -->
        <div class="finance-panel">
            <div class="panel-title">📊 每日收支</div>
            <div class="finance-row">
                <span>💵 薪资支出:</span>
                <span id="daily-salary">$0</span>
            </div>
            <div class="finance-row">
                <span>🏢 办公室租金:</span>
                <span id="daily-rent">$0</span>
            </div>
            <div class="finance-row total">
                <span>📌 总支出:</span>
                <span id="daily-expenses">$0</span>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-panel">
            <button class="btn btn-primary" onclick="nextDay()">📅 下一天</button>
            <button class="btn btn-success" onclick="showTab('agents')">👥 雇佣员工</button>
            <button class="btn btn-info" onclick="showTab('projects')">📋 查看项目</button>
            <button class="btn btn-warning" onclick="upgradeOffice()">🏢 升级办公室</button>
        </div>

        <!-- 消息通知 -->
        <div id="notifications" class="notifications"></div>

        <!-- 标签页内容 -->
        <div class="tabs">
            <!-- Agent 列表 -->
            <div id="tab-agents" class="tab-content">
                <h2>👥 员工管理</h2>
                <div id="agents-list" class="cards-grid"></div>
                <div class="hire-form">
                    <h3>雇佣新员工</h3>
                    <select id="hire-role">
                        <option value="初级程序员">初级程序员 ($1k/天)</option>
                        <option value="中级程序员">中级程序员 ($2k/天)</option>
                        <option value="高级程序员">高级程序员 ($4k/天)</option>
                        <option value="设计师">设计师 ($2.5k/天)</option>
                        <option value="产品经理">产品经理 ($3.5k/天)</option>
                    </select>
                    <button class="btn btn-success" onclick="hireAgent()">雇佣</button>
                </div>
            </div>

            <!-- 项目列表 -->
            <div id="tab-projects" class="tab-content">
                <h2>📋 项目管理</h2>
                <div id="projects-list" class="cards-grid"></div>
            </div>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="game-over" class="modal" style="display:none;">
            <div class="modal-content">
                <h2 id="game-over-title">游戏结束</h2>
                <p id="game-over-reason"></p>
                <button class="btn btn-primary" onclick="newGame()">重新开始</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
